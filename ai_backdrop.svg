<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="40%" stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background glow at center -->
  <ellipse cx="450" cy="160" rx="200" ry="140" fill="url(#glow-center)" filter="url(#blur-sm)"/>

  <!-- ── LEFT SIDE: Input products (unlabelled) ── -->

  <!-- Product box 1 -->
  <rect x="28" y="48" width="158" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="44" y="62" width="24" height="24" rx="5" fill="rgba(255,255,255,0.1)"/>
  <rect x="76" y="64" width="80" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="76" y="77" width="55" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>

  <!-- Product box 2 -->
  <rect x="28" y="120" width="158" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="44" y="134" width="24" height="24" rx="5" fill="rgba(255,255,255,0.1)"/>
  <rect x="76" y="136" width="90" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="76" y="149" width="60" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>

  <!-- Product box 3 -->
  <rect x="28" y="192" width="158" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="44" y="206" width="24" height="24" rx="5" fill="rgba(255,255,255,0.1)"/>
  <rect x="76" y="208" width="70" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="76" y="221" width="50" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>

  <!-- Label: "120k+ products" -->
  <text x="107" y="270" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-family="Inter, -apple-system, sans-serif" letter-spacing="0.08em">120K+ PRODUCTS</text>

  <!-- ── CONNECTING LINES: Left → Center ── -->
  <!-- Top line -->
  <line x1="186" y1="74" x2="360" y2="148" stroke="url(#line-fade)" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- Mid line -->
  <line x1="186" y1="146" x2="360" y2="158" stroke="url(#line-fade)" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- Bottom line -->
  <line x1="186" y1="218" x2="360" y2="170" stroke="url(#line-fade)" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- Moving dot on top line -->
  <circle cx="270" cy="111" r="3" fill="#60a5fa" opacity="0.8"/>
  <circle cx="240" cy="122" r="2" fill="#60a5fa" opacity="0.4"/>
  <!-- Moving dot on mid line -->
  <circle cx="275" cy="150" r="3" fill="#60a5fa" opacity="0.8"/>
  <!-- Moving dot on bottom line -->
  <circle cx="258" cy="200" r="3" fill="#60a5fa" opacity="0.8"/>
  <circle cx="230" cy="207" r="2" fill="#60a5fa" opacity="0.4"/>

  <!-- ── CENTER: CATEX ENGINE ── -->
  <!-- Outer ring -->
  <circle cx="450" cy="160" r="80" fill="rgba(37,99,235,0.1)" stroke="rgba(96,165,250,0.2)" stroke-width="1" stroke-dasharray="6 4"/>
  <!-- Middle ring -->
  <circle cx="450" cy="160" r="58" fill="rgba(37,99,235,0.18)" stroke="rgba(96,165,250,0.35)" stroke-width="1.5"/>
  <!-- Inner core -->
  <circle cx="450" cy="160" r="38" fill="rgba(37,99,235,0.45)" stroke="rgba(96,165,250,0.7)" stroke-width="1.5"/>
  <!-- Glow blob behind engine -->
  <ellipse cx="450" cy="160" rx="45" ry="45" fill="url(#glow-blue)" filter="url(#blur-sm)"/>
  <!-- Engine text -->
  <text x="450" y="153" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter, -apple-system, sans-serif" letter-spacing="0.15em">CATEX</text>
  <text x="450" y="168" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="9" font-family="Inter, -apple-system, sans-serif" letter-spacing="0.12em">ENGINE</text>

  <!-- Orbiting dots -->
  <circle cx="450" cy="82" r="4" fill="#60a5fa" opacity="0.6"/>
  <circle cx="528" cy="112" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="372" cy="112" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="450" cy="238" r="4" fill="#60a5fa" opacity="0.6"/>
  <circle cx="528" cy="208" r="3" fill="#93c5fd" opacity="0.4"/>
  <circle cx="372" cy="208" r="3" fill="#93c5fd" opacity="0.4"/>

  <!-- ── CONNECTING LINES: Center → Right ── -->
  <line x1="540" y1="148" x2="712" y2="74" stroke="url(#line-fade)" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="540" y1="160" x2="712" y2="146" stroke="url(#line-fade)" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="540" y1="172" x2="712" y2="218" stroke="url(#line-fade)" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- Dots on outbound lines -->
  <circle cx="630" cy="107" r="3" fill="#60a5fa" opacity="0.8"/>
  <circle cx="660" cy="95" r="2" fill="#60a5fa" opacity="0.4"/>
  <circle cx="625" cy="155" r="3" fill="#60a5fa" opacity="0.8"/>
  <circle cx="645" cy="199" r="3" fill="#60a5fa" opacity="0.8"/>
  <circle cx="675" cy="208" r="2" fill="#60a5fa" opacity="0.4"/>

  <!-- ── RIGHT SIDE: Categorised output ── -->

  <!-- Category 1: Dairy (classified ✓) -->
  <rect x="712" y="48" width="162" height="52" rx="10" fill="rgba(37,99,235,0.25)" stroke="rgba(96,165,250,0.5)" stroke-width="1"/>
  <rect x="728" y="62" width="24" height="24" rx="5" fill="rgba(96,165,250,0.3)"/>
  <text x="740" y="78" text-anchor="middle" fill="#93c5fd" font-size="13">🥛</text>
  <text x="796" y="67" fill="rgba(255,255,255,0.9)" font-size="11" font-weight="600" font-family="Inter, -apple-system, sans-serif">Dairy &amp; Eggs</text>
  <rect x="796" y="76" width="52" height="14" rx="7" fill="rgba(16,185,129,0.3)" stroke="rgba(16,185,129,0.5)" stroke-width="1"/>
  <text x="822" y="87" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="700" font-family="Inter, -apple-system, sans-serif">✓ 97%</text>

  <!-- Category 2: Beverages (classified ✓) -->
  <rect x="712" y="120" width="162" height="52" rx="10" fill="rgba(37,99,235,0.25)" stroke="rgba(96,165,250,0.5)" stroke-width="1"/>
  <rect x="728" y="134" width="24" height="24" rx="5" fill="rgba(96,165,250,0.3)"/>
  <text x="740" y="150" text-anchor="middle" fill="#93c5fd" font-size="13">🍺</text>
  <text x="796" y="139" fill="rgba(255,255,255,0.9)" font-size="11" font-weight="600" font-family="Inter, -apple-system, sans-serif">Beverages</text>
  <rect x="796" y="148" width="52" height="14" rx="7" fill="rgba(16,185,129,0.3)" stroke="rgba(16,185,129,0.5)" stroke-width="1"/>
  <text x="822" y="159" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="700" font-family="Inter, -apple-system, sans-serif">✓ 94%</text>

  <!-- Category 3: Snacks (classified ✓) -->
  <rect x="712" y="192" width="162" height="52" rx="10" fill="rgba(37,99,235,0.25)" stroke="rgba(96,165,250,0.5)" stroke-width="1"/>
  <rect x="728" y="206" width="24" height="24" rx="5" fill="rgba(96,165,250,0.3)"/>
  <text x="740" y="222" text-anchor="middle" fill="#93c5fd" font-size="13">🍪</text>
  <text x="796" y="211" fill="rgba(255,255,255,0.9)" font-size="11" font-weight="600" font-family="Inter, -apple-system, sans-serif">Snacks</text>
  <rect x="796" y="220" width="52" height="14" rx="7" fill="rgba(16,185,129,0.3)" stroke="rgba(16,185,129,0.5)" stroke-width="1"/>
  <text x="822" y="231" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="700" font-family="Inter, -apple-system, sans-serif">✓ 99%</text>

  <!-- Label: "Auto-assigned" -->
  <text x="793" y="270" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-family="Inter, -apple-system, sans-serif" letter-spacing="0.08em">AUTO-ASSIGNED</text>
</svg>
