<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#1a0608"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1" fill="rgba(225,38,28,0.18)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="400" fill="url(#bg)"/>
  <rect width="1000" height="400" fill="url(#dots)"/>

  <!-- Giant faded A (left background texture) -->
  <text x="160" y="320" text-anchor="middle" fill="rgba(225,38,28,0.05)"
        font-size="400" font-weight="900" font-family="sans-serif">A</text>

  <!-- Giant faded B (right background texture) -->
  <text x="730" y="320" text-anchor="middle" fill="rgba(225,38,28,0.08)"
        font-size="400" font-weight="900" font-family="sans-serif">B</text>

  <!-- Bell curve A (left, muted red) -->
  <path d="M-20 400 Q80 400 160 260 Q240 120 320 260 Q400 400 500 400"
        fill="rgba(225,38,28,0.15)" stroke="rgba(225,38,28,0.3)" stroke-width="1.5"/>

  <!-- Bell curve B (right, prominent red — shifted right, taller peak) -->
  <path d="M500 400 Q600 400 700 120 Q800 -160 900 120 Q980 400 1100 400"
        fill="rgba(225,38,28,0.25)" stroke="rgba(255,100,80,0.55)" stroke-width="2"/>

  <!-- Significance divider line -->
  <line x1="500" y1="0" x2="500" y2="400" stroke="rgba(255,255,255,0.06)"
        stroke-width="1" stroke-dasharray="6,5"/>

  <!-- "Variant A" label -->
  <text x="255" y="195" text-anchor="middle" fill="rgba(255,120,100,0.4)"
        font-size="14" font-family="sans-serif" font-weight="700" letter-spacing="1">Variant A</text>

  <!-- "Variant B" label -->
  <text x="710" y="100" text-anchor="middle" fill="rgba(255,160,140,0.7)"
        font-size="14" font-family="sans-serif" font-weight="700" letter-spacing="1">Variant B</text>

  <!-- Winner badge — Dream11 red -->
  <rect x="622" y="118" width="174" height="32" rx="16"
        fill="#E1261C" stroke="rgba(255,120,100,0.4)" stroke-width="1"/>
  <text x="709" y="139" text-anchor="middle" fill="white"
        font-size="12" font-family="sans-serif" font-weight="700" letter-spacing="0.5">✓ WINNER  +14% lift</text>

  <!-- p-value pill (bottom center) -->
  <rect x="390" y="355" width="220" height="28" rx="10"
        fill="rgba(225,38,28,0.25)" stroke="rgba(225,38,28,0.2)" stroke-width="1"/>
  <text x="500" y="374" text-anchor="middle" fill="rgba(255,160,140,0.65)"
        font-size="12" font-family="sans-serif">p &lt; 0.05  ·  95% CI  ·  n=1.2M</text>

  <!-- Scatter dots (red tones) -->
  <circle cx="80"  cy="375" r="2.5" fill="rgba(225,38,28,0.35)"/>
  <circle cx="140" cy="363" r="2"   fill="rgba(225,38,28,0.3)"/>
  <circle cx="200" cy="370" r="3"   fill="rgba(225,38,28,0.35)"/>
  <circle cx="260" cy="355" r="2"   fill="rgba(225,38,28,0.3)"/>
  <circle cx="320" cy="362" r="2.5" fill="rgba(225,38,28,0.35)"/>
  <circle cx="560" cy="360" r="2.5" fill="rgba(255,100,80,0.45)"/>
  <circle cx="620" cy="345" r="3"   fill="rgba(255,100,80,0.5)"/>
  <circle cx="680" cy="337" r="2"   fill="rgba(255,100,80,0.45)"/>
  <circle cx="740" cy="325" r="3"   fill="rgba(255,100,80,0.5)"/>
  <circle cx="800" cy="332" r="2.5" fill="rgba(255,100,80,0.45)"/>
  <circle cx="860" cy="340" r="2"   fill="rgba(255,100,80,0.45)"/>
  <circle cx="920" cy="355" r="2.5" fill="rgba(255,100,80,0.4)"/>
</svg>
